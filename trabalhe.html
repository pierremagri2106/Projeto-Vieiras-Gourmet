    <main>

        <section class="fundo-primeira-parte">
            <h2>Quer entrar para o time? <br>Envie seu currículo abaixo</h2>
        </div>
        <div class="sabores fundo-primeira-parte">

            <section class="container-avaliacao">
        
        <form action="#" method="post">
            <label for="nome">Seu Nome Completo:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="nome">Disponibilidade de Horário:</label>
            <input type="text" id="nome" name="nome" required>

            <label>Sua nota:</label>
            <label for="nome">Nome Completo:</label>
        <input type="text" id="nome" name="nome" required>

        <!-- Seletor de Opções -->
        <label for="vaga">Mora em Belo Horizonte ?</label>
        <select id="vaga" name="vaga" required style="width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px;">
            <option value="" disabled selected>Selecione uma opção</option>
            <option value="sim">Sim</option>
            <option value="não">Não</option>
            
        </select>
            <label for="comentario">Porque você quer fazer parte no time ?</label>
            <textarea id="comentario" name="comentario" rows="4" required></textarea>
            <label for="curriculo">Anexar Currículo (PDF ou Imagem):</label>
        <input type="file" id="curriculo" name="curriculo" accept=".pdf, .jpg, .png" required style="padding: 10px; background: #fff;">

        <label for="mensagem">Conte um pouco sobre você:</label>
        <textarea id="mensagem" name="mensagem" rows="4"></textarea>
            
            
            <button type="submit" class="btn-nav">Enviar Curriculo</button>


        </form>
